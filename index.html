<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      const originalError = console.error;
      console.error = (...args) => {
        if (typeof args[0] === 'string' && /ResizeObserver|Script error\./.test(args[0])) return;
        if (args[0] instanceof Error && /ResizeObserver|Script error\./.test(args[0].message)) return;
        originalError.call(console, ...args);
      };
      window.addEventListener('error', (e) => {
        if (e.message === 'Script error.' || e.message?.includes('ResizeObserver')) {
          e.stopImmediatePropagation();
        }
      }, true);
      window.addEventListener('unhandledrejection', (e) => {
        if (e.reason?.message === 'Script error.' || e.reason?.message?.includes('ResizeObserver')) {
          e.stopImmediatePropagation();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
